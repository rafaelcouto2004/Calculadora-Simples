<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora - Rafael Rocha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Tema Escuro (Padrão) */
            --bg-body: #0f0f0f;
            --bg-calc: #1a1a1a;
            --bg-visor: #000000;
            --bg-botao: #2d2d2d;
            --bg-funcao: #404040;
            --texto: #ffffff;
            --texto-hist: #888888;
            --sombra: rgba(0,0,0,0.5);
            --borda: #2a2a2a;
        }

        .light-mode {
            /* Tema Claro */
            --bg-body: #f0f2f5;
            --bg-calc: #ffffff;
            --bg-visor: #f8f9fa;
            --bg-botao: #e9ecef;
            --bg-funcao: #dee2e6;
            --texto: #212529;
            --texto-hist: #adb5bd;
            --sombra: rgba(0,0,0,0.1);
            --borda: #dee2e6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--texto);
            transition: background 0.3s ease;
        }

        .container { text-align: center; position: relative; }

        .header { margin-bottom: 20px; }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header h2 { font-size: 14px; opacity: 0.5; font-weight: 300; text-transform: uppercase; }

        .calculadora {
            background-color: var(--bg-calc);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px var(--sombra);
            border: 1px solid var(--borda);
            width: 340px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Visor */
        .visor-container {
            background-color: var(--bg-visor);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            border: 1px solid var(--borda);
        }

        #btn-historico, #btn-tema {
            position: absolute;
            top: 12px;
            background: none;
            border: none;
            color: var(--texto-hist);
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            z-index: 5;
        }

        #btn-historico { left: 12px; }
        #btn-tema { right: 12px; }
        #btn-historico:hover, #btn-tema:hover { color: var(--texto); }

        #operacao-anterior {
            color: var(--texto-hist);
            font-size: 16px;
            text-align: right;
            height: 24px;
            margin-bottom: 5px;
        }

        #resultado {
            width: 100%;
            font-size: 48px;
            font-weight: 300;
            text-align: right;
            color: var(--texto);
            overflow: hidden;
        }

        /* Painel de Histórico */
        #painel-historico {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-calc);
            border-radius: 30px;
            padding: 25px;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        #painel-historico h3 { font-size: 18px; margin-bottom: 15px; border-bottom: 1px solid var(--borda); padding-bottom: 5px; }
        
        #lista-historico {
            flex-grow: 1;
            overflow-y: auto;
            text-align: right;
            list-style: none;
        }

        #lista-historico li {
            padding: 12px 8px;
            border-bottom: 1px solid var(--borda);
            cursor: pointer;
            border-radius: 8px;
        }

        #lista-historico li:hover { background: var(--bg-visor); }

        .hist-conta { font-size: 12px; color: var(--texto-hist); display: block; }
        .hist-res { font-size: 18px; font-weight: 600; }

        .btn-fechar {
            background: #b31b1b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Teclado */
        .teclado { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        
        .botao {
            width: 65px; height: 65px; font-size: 22px; border-radius: 18px;
            border: none; background-color: var(--bg-botao); color: var(--texto);
            cursor: pointer; transition: all 0.2s;
            display: flex; justify-content: center; align-items: center;
        }

        .botao:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .botao:active { transform: scale(0.95); }

        .operador { background-color: #b31b1b; color: white; font-weight: 600; }
        .igual { background-color: #e62e2e; color: white; }
        .funcao-topo { background-color: var(--bg-funcao); }
        .zero { grid-column: span 2; width: 100%; }

    </style>
</head>
<body class="dark-mode">

<div class="container">
    <div class="header">
        <h1>Rafael Rocha</h1>
        <h2>Calculadora Pro</h2>
    </div>

    <div class="calculadora">
        <div id="painel-historico">
            <h3>Histórico</h3>
            <ul id="lista-historico"></ul>
            <button class="btn-fechar" onclick="toggleHistorico()">Fechar</button>
        </div>

        <div class="visor-container">
            <button id="btn-historico" title="Histórico" onclick="toggleHistorico()">⎋</button>
            <button id="btn-tema" title="Trocar Tema" onclick="toggleTema()">☽</button>
            
            <div id="operacao-anterior"></div>
            <div id="resultado">0</div>
        </div>
        
        <div class="teclado">
            <button class="botao funcao-topo" onclick="back()">⌫</button>
            <button class="botao funcao-topo" onclick="clean()">AC</button>
            <button class="botao operador" onclick="porcentagem()">%</button>
            <button class="botao operador" onclick="insert('÷')">÷</button>

            <button class="botao" onclick="insert('7')">7</button>
            <button class="botao" onclick="insert('8')">8</button>
            <button class="botao" onclick="insert('9')">9</button>
            <button class="botao operador" onclick="insert('x')">×</button>

            <button class="botao" onclick="insert('4')">4</button>
            <button class="botao" onclick="insert('5')">5</button>
            <button class="botao" onclick="insert('6')">6</button>
            <button class="botao operador" onclick="insert('-')">−</button>

            <button class="botao" onclick="insert('1')">1</button>
            <button class="botao" onclick="insert('2')">2</button>
            <button class="botao" onclick="insert('3')">3</button>
            <button class="botao operador" onclick="insert('+')">+</button>

            <button class="botao zero" onclick="insert('0')">0</button>
            <button class="botao" onclick="insert('.')">,</button>
            <button class="botao operador igual" onclick="calcular()">=</button>
        </div>
    </div>
</div>

<script>
    const display = document.getElementById('resultado');
    const operacaoAnterior = document.getElementById('operacao-anterior');
    const painelHistorico = document.getElementById('painel-historico');
    const listaHistorico = document.getElementById('lista-historico');

    let historico = JSON.parse(localStorage.getItem('historicoCalculos')) || [];

    window.onload = () => {
        // Carregar Tema
        if (localStorage.getItem('tema') === 'light') document.body.classList.add('light-mode');
        // Carregar Histórico
        renderizarHistorico();
        ajustarFonte();
    };

    function toggleTema() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('tema', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    function toggleHistorico() {
        painelHistorico.style.display = (painelHistorico.style.display === 'flex') ? 'none' : 'flex';
    }

    function insert(num) {
        if (display.innerHTML === "0" || display.innerHTML === "Erro") display.innerHTML = num;
        else if (display.innerHTML.length < 14) display.innerHTML += num;
        ajustarFonte();
    }

    function clean() {
        display.innerHTML = "0";
        operacaoAnterior.innerHTML = "";
        ajustarFonte();
    }

    function back() {
        let atual = display.innerHTML;
        display.innerHTML = (atual.length > 1 && atual !== "Erro") ? atual.slice(0, -1) : "0";
        ajustarFonte();
    }

    function calcular() {
        let expressao = display.innerHTML;
        if (!expressao || expressao === "0" || expressao === "Erro") return;

        try {
            let formula = expressao.replace(/x/g, "*").replace(/÷/g, "/");
            // Segurança: Apenas números e operadores
            if (!/^[\d.+\-*/]+$/.test(formula)) throw new Error();

            let res = Function(`'use strict'; return (${formula})`)();
            if (!isFinite(res)) throw new Error();

            let formatado = Number.isInteger(res) ? res : parseFloat(res.toFixed(8));
            
            salvarHistorico(expressao, formatado);
            operacaoAnterior.innerHTML = `${expressao} =`;
            display.innerHTML = formatado;
            ajustarFonte();
        } catch (e) {
            display.innerHTML = "Erro";
        }
    }

    function salvarHistorico(conta, resultado) {
        historico.unshift({ conta, resultado });
        if (historico.length > 10) historico.pop();
        localStorage.setItem('historicoCalculos', JSON.stringify(historico));
        renderizarHistorico();
    }

    function renderizarHistorico() {
        listaHistorico.innerHTML = historico.map((item, index) => `
            <li onclick="recuperarHistorico(${index})">
                <span class="hist-conta">${item.conta} =</span>
                <span class="hist-res">${item.resultado}</span>
            </li>
        `).join('');
    }

    function recuperarHistorico(index) {
        display.innerHTML = historico[index].resultado;
        operacaoAnterior.innerHTML = historico[index].conta + " =";
        toggleHistorico();
        ajustarFonte();
    }

    function porcentagem() {
        let atual = parseFloat(display.innerHTML);
        if (!isNaN(atual)) {
            display.innerHTML = atual / 100;
            ajustarFonte();
        }
    }

    function ajustarFonte() {
        let t = display.innerHTML.length;
        if (t > 12) display.style.fontSize = "24px";
        else if (t > 8) display.style.fontSize = "34px";
        else display.style.fontSize = "48px";
    }

    // Teclado Físico
    document.addEventListener("keydown", (e) => {
        const key = e.key;
        if (!isNaN(key)) insert(key);
        const ops = {"*": "x", "/": "÷", "+": "+", "-": "-", ".": ".", ",": "."};
        if (ops[key]) insert(ops[key]);
        if (key === "Enter") { e.preventDefault(); calcular(); }
        if (key === "Backspace") back();
        if (key === "Escape") clean();
    });
</script>

</body>
</html>
